@include "nodes.conf"

paths = (
    {
        in = "load_typhoon"
        out = "file_node"

        hooks = (
            {
                type = "limit_rate",
                enabled = true,
                mode = "origin", # "local" "received" "origin"
                priority = 89,
                rate = 200      # The maximum sample rate in 1/s before this hook will drop 
            },
            { 
                type = "print",
                enabled = true,
                priority = 90,
                format = {
                            type = "json"
                            indent = 0
                            compact = false
                            ts_received = true
                            ts_origin = true
                            offset = false
                            real_precision = 6
                            sequence = true
                        }
			}
        )
    }
)