# This files just contains some simple nodes
# which are used to demonstrate the functionalities
# of different hooks

nodes = {
    typhoon = {
        type = "socket",
        layer = "udp",
        #vectorize = 30,            # Receive and sent 30 samples per message (combining).
        builtin = true,             # By default, all nodes will have a few builtin hooks attached to them.
                                    # When collecting statistics or measurements these are undesired.
        format = {
            type = "raw"
            endianess = "little"
            bits = 64
        }
        in = {
            address = "*:12007", # Endpoint dove deve inviare Typhoon la corrente
            signals = (
                 { name = "Corrente_D", unit = "Ampere", type = "complex"},
                 { name = "Corrente_I", unit = "Ampere", type = "complex"},
                 { name = "Corrente_O", unit = "Ampere", type = "complex"}
            )
        },
        out = {
            address = "192.168.1.68:12007",  # Indirizzo IP di Typhoon
            netem = {                         # Network emulation settings
                enabled = false,
                delay = 100000,          # Additional latency in microseconds
                jitter = 30000,          # Jitter in uS
                distribution = "normal", # Distribution of delay: uniform, normal, pareto, paretonormal
                loss = 2,               # Packet loss in percent
                duplicate = 0,          # Duplication in percent
                corrupt = 0             # Corruption in percent
            },
            signals = (
                 { name = "Tensione_D", unit = "Volt", type = "complex"},
                 { name = "Tensione_I", unit = "Volt", type = "complex"},
                 { name = "Tensione_O", unit = "Volt", type = "complex"}
            )
        }
    },
    load_typhoon = {
        type = "socket",
        layer = "udp",
        #vectorize = 30,            # Receive and sent 30 samples per message (combining).
        builtin = true,             # By default, all nodes will have a few builtin hooks attached to them.
                                    # When collecting statistics or measurements these are undesired.
        format = {
                        type = "json",
                        indent = 0,
                        compact = true,
                        ts_received = false,
                        ts_origin = false,
                        offset = false,
                        real_precision = 12,
                        sequence = false
        },
        in = {
            address = "*:12008", # Endpoint dove deve spedire il carico la tensione 
            signals = (
                 { name = "Tensione_D", unit = "Volt", type = "complex"},
                 { name = "Tensione_I", unit = "Volt", type = "complex"},
                 { name = "Tensione_O", unit = "Volt", type = "complex"}
            )
        },
        out = {
            address = "127.0.0.1:12005",  # TO dpsim
            netem = {                   # Network emulation settings
                enabled = false,
                delay = 100000,          # Additional latency in microseconds
                jitter = 30000,          # Jitter in uS
                distribution = "normal", # Distribution of delay: uniform, normal, pareto, paretonormal
                loss = 2,               # Packet loss in percent
                duplicate = 0,          # Duplication in percent
                corrupt = 0             # Corruption in percent
            },
            signals = (
                 { name = "Corrente_D", unit = "Ampere", type = "complex"},
                 { name = "Corrente_I", unit = "Ampere", type = "complex"},
                 { name = "Corrente_O", unit = "Ampere", type = "complex"}
            )
        }
    },
    file_node = {
        type = "file"
        uri = "/logs/log_signal_hook_%Y-%m-%d_%H-%M-%S.log",
    }
}